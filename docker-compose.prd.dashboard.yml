# -----------------------------------------------------------------------------
# Compose de produção — siscan-dashboard (VM dedicada, banco externo).
#
# Use este arquivo na VM do dashboard quando o PostgreSQL e o RPA rodam
# em servidores separados. A aplicação conecta ao banco do dashboard e
# o serviço sync conecta também ao banco do RPA via RPA_DATABASE_URL.
#
# Uso:
#   docker compose -f docker-compose.prd.dashboard.yml pull
#   docker compose -f docker-compose.prd.dashboard.yml up -d --wait
# -----------------------------------------------------------------------------

name: siscan-dashboard

x-app-common-env: &app-common-env
  DATABASE_URL: postgresql://${DATABASE_USER:-siscan_dashboard}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-5432}/${DATABASE_NAME:-siscan_dashboard}
  RPA_DATABASE_URL: ${RPA_DATABASE_URL}
  SESSION_SECRET: ${SESSION_SECRET}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
  NEUSA_PASSWORD: ${NEUSA_PASSWORD:-}
  SECRETARIA_PASSWORD: ${SECRETARIA_PASSWORD:-}
  ROCHE_PASSWORD: ${ROCHE_PASSWORD:-}
  APP_INTERNAL_PORT: "5000"
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
  GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
  GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
  SQLALCHEMY_POOL_SIZE: ${SQLALCHEMY_POOL_SIZE:-5}
  SQLALCHEMY_MAX_OVERFLOW: ${SQLALCHEMY_MAX_OVERFLOW:-2}
  SQLALCHEMY_POOL_TIMEOUT: ${SQLALCHEMY_POOL_TIMEOUT:-30}
  SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-300}
  PYTHONUNBUFFERED: "1"
  TZ: ${TZ:-America/Sao_Paulo}

services:
  migrate:
    image: ghcr.io/prisma-consultoria/siscan-dashboard:main
    restart: "no"
    environment: *app-common-env
    command: ["alembic", "upgrade", "head"]

  app:
    image: ghcr.io/prisma-consultoria/siscan-dashboard:main
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *app-common-env
    ports:
      - "${HOST_APP_EXTERNAL_PORT:-5000}:5000"
    volumes:
      - type: bind
        source: ${HOST_LOG_DIR}
        target: /app/logs
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: local
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -fsS http://127.0.0.1:5000/health | grep -q '\"schema_status\":\"current\"'"]
      interval: 15s
      timeout: 3s
      retries: 5
    command:
      - gunicorn
      - --bind=0.0.0.0:5000
      - --workers=${WEB_CONCURRENCY:-4}
      - --threads=${GUNICORN_THREADS:-4}
      - --timeout=${GUNICORN_TIMEOUT:-120}
      - --access-logfile=/app/logs/access.log
      - --error-logfile=/app/logs/error.log
      - main:server

  sync:
    image: ghcr.io/prisma-consultoria/siscan-dashboard:main
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-common-env
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-1800}
    command:
      - python
      - -m
      - src.commands.sync_exames
      - --loop
      - ${SYNC_INTERVAL_SECONDS:-1800}
