name: siscan-rpa

# -----------------------------------------------------------------------------
# Ambiente comum da aplicação dentro do container.
# DATABASE_HOST é fixo como "db" — o container PostgreSQL desta stack.
# -----------------------------------------------------------------------------
x-app-common-env: &app-common-env
  PRODUCTION: "true"
  SECRET_KEY: ${SECRET_KEY}
  RPA_MAX_ATTEMPTS: ${RPA_MAX_ATTEMPTS:-3}
  DATABASE_NAME: ${DATABASE_NAME:-siscan_rpa}
  DATABASE_USER: ${DATABASE_USER:-siscan_rpa}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-siscan_rpa}
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  DATABASE_HOST: db
  PW_HEADLESS: "true"
  PW_BROWSER: chromium
  PW_CONTEXT_STORAGE_STATE: /app/data/.artifacts/auth/storage_state.json
  # Diagnóstico desabilitado em produção (fixo — não sobrescrito por .env)
  TAKE_SCREENSHOT: "false"
  PW_RECORD_VIDEO: "false"
  PW_TRACING: "false"
  SAVE_PAGE_HTML: "false"

x-app-common-volumes: &app-common-volumes
  - ${VOLUME_DATA:-siscan-data}:/app/data
  - ${VOLUME_MEDIA:-siscan-media}:/app/media
  - ${VOLUME_LOGS:-siscan-logs}:/app/logs
  - ${VOLUME_CONFIG:-siscan-config}:/app/config

services:
  db:
    # Banco de dados PostgreSQL gerenciado pelo Docker.
    image: postgres:17
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-siscan_rpa}
      POSTGRES_USER: ${DATABASE_USER:-siscan_rpa}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-siscan_rpa}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${VOLUME_DB:-siscan-db}:/var/lib/postgresql/data
    restart: unless-stopped

  migrate:
    # Executa migrations antes de subir a aplicação.
    image: ghcr.io/prisma-consultoria/siscan-rpa-rpa:main
    restart: "no"
    environment: *app-common-env
    command: ["bash", "-lc", "python cli.py migrate-db"]
    depends_on:
      db:
        condition: service_healthy
    volumes: *app-common-volumes

  siscan:
    container_name: extrator-siscan-rpa
    image: ghcr.io/prisma-consultoria/siscan-rpa-rpa:main
    restart: unless-stopped
    environment:
      <<: *app-common-env
      CRON_ENABLED: "true"
      CRON_INTERVAL_SECONDS: ${CRON_INTERVAL_SECONDS:-1800}
    ports:
      - "${HOST_APP_EXTERNAL_PORT:-5001}:${APP_INTERNAL_PORT:-5000}"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes: *app-common-volumes
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: local
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://127.0.0.1:${APP_INTERNAL_PORT:-5000}/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  ${VOLUME_DB:-siscan-db}:
    # Dados PostgreSQL
  ${VOLUME_DATA:-siscan-data}:
    # Autenticação do Playwright (session state)
  ${VOLUME_MEDIA:-siscan-media}:
    # Downloads, relatórios de laudos e Excel consolidado
  ${VOLUME_LOGS:-siscan-logs}:
    # Logs operacionais
  ${VOLUME_CONFIG:-siscan-config}:
    # Arquivo JSON de mapeamento de colunas do Excel (opcional)
    # Insira via: docker compose cp excel_columns_mapping.json siscan:/app/config/
