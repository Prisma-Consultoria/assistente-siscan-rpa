name: siscan-rpa

# -----------------------------------------------------------------------------
# Ambiente comum da aplicação dentro do container.
# DATABASE_HOST é fixo como "db" — o container PostgreSQL desta stack.
# Variáveis sem HOST_* apontam para caminhos internos fixos em /app/...
# -----------------------------------------------------------------------------
x-app-common-env: &app-common-env
  PRODUCTION: "true"
  SECRET_KEY: ${SECRET_KEY}
  APP_INTERNAL_PORT: "5000"
  APP_EXTERNAL_PORT: ${HOST_APP_EXTERNAL_PORT:-5001}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-%(asctime)s | %(levelname)-8s | %(name)-20s | %(funcName)s:%(lineno)d | %(message)s}
  LOG_DATE_FORMAT: ${LOG_DATE_FORMAT:-%Y-%m-%d %H:%M:%S}
  WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
  DATABASE_NAME: ${DATABASE_NAME:-siscan_rpa}
  DATABASE_USER: ${DATABASE_USER:-siscan_rpa}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-siscan_rpa}
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  DATABASE_HOST: db
  LOG_DIR: /app/logs
  DOWNLOAD_DIR: /app/media/downloads
  SISCAN_REPORTS_INPUT_DIR: /app/media/downloads
  REPORTS_OUTPUT_CONSOLIDATED_DIR: /app/media/reports/mamografia/consolidated
  REPORTS_OUTPUT_CONSOLIDATED_PDFS_DIR: /app/media/reports/mamografia/consolidated/laudos
  EXCEL_COLUMNS_MAPPING_PATH: /app/config/${HOST_SHEET_COLUMNS_MAPPING_NAME:-excel_columns_mapping.json}
  RPA_MAX_ATTEMPTS: ${RPA_MAX_ATTEMPTS:-3}
  PW_HEADLESS: "true"
  PW_BROWSER: chromium
  PW_CONTEXT_TIMEZONE: ${PW_CONTEXT_TIMEZONE:-America/Fortaleza}
  PW_CONTEXT_STORAGE_STATE: /app/data/.artifacts/auth/storage_state.json
  PW_CONTEXT_STORAGE_STATE_STRICT: ${PW_CONTEXT_STORAGE_STATE_STRICT:-true}
  TZ: ${PW_CONTEXT_TIMEZONE:-America/Fortaleza}
  # Diagnóstico desabilitado em produção (fixo — não sobrescrito por .env)
  TAKE_SCREENSHOT: "false"
  PW_RECORD_VIDEO: "false"
  PW_TRACING: "false"
  SAVE_PAGE_HTML: "false"

x-app-common-volumes: &app-common-volumes
  - ${VOLUME_DATA:-siscan-data}:/app/data
  - ${VOLUME_MEDIA:-siscan-media}:/app/media
  - ${VOLUME_LOGS:-siscan-logs}:/app/logs
  - ${VOLUME_CONFIG:-siscan-config}:/app/config

services:
  db:
    # Banco de dados PostgreSQL gerenciado pelo Docker.
    image: postgres:17
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-siscan_rpa}
      POSTGRES_USER: ${DATABASE_USER:-siscan_rpa}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-siscan_rpa}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${VOLUME_DB:-siscan-db}:/var/lib/postgresql/data
    restart: unless-stopped

  migrate:
    # Executa migrations antes de subir os demais serviços.
    image: ghcr.io/prisma-consultoria/siscan-rpa-rpa:main
    restart: "no"
    environment: *app-common-env
    command: ["bash", "-lc", "python cli.py migrate-db"]
    depends_on:
      db:
        condition: service_healthy
    volumes: *app-common-volumes

  app:
    # Serviço HTTP principal exposto ao usuário final.
    image: ghcr.io/prisma-consultoria/siscan-rpa-rpa:main
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *app-common-env
    ports:
      - "${HOST_APP_EXTERNAL_PORT:-5001}:5000"
    volumes: *app-common-volumes
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: local
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://127.0.0.1:${APP_INTERNAL_PORT:-5000}/health | grep -q '\"schema_status\":\"current\"'"]
      interval: 15s
      timeout: 3s
      retries: 5

  rpa-scheduler:
    # Loop agendado de execução batch. Reaproveita os mesmos mounts do app.
    image: ghcr.io/prisma-consultoria/siscan-rpa-rpa:main
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-common-env
      CRON_ENABLED: "true"
      CRON_INTERVAL_SECONDS: ${CRON_INTERVAL_SECONDS:-1800}
    command: ["/bin/sh", "-c", "python cli.py db-ensure-current && if [ \"$(echo ${CRON_ENABLED:-true} | tr '[:upper:]' '[:lower:]')\" != \"true\" ]; then echo 'rpa-scheduler disabled'; sleep infinity; fi; exec /bin/bash /app/scripts/prod/cron_loop.sh"]
    volumes: *app-common-volumes

volumes:
  ${VOLUME_DB:-siscan-db}:
    # Dados PostgreSQL
  ${VOLUME_DATA:-siscan-data}:
    # Dados do Playwright (session state e artefatos)
  ${VOLUME_MEDIA:-siscan-media}:
    # Downloads, relatórios de laudos e Excel consolidado
  ${VOLUME_LOGS:-siscan-logs}:
    # Logs operacionais
  ${VOLUME_CONFIG:-siscan-config}:
    # Arquivo JSON de mapeamento de colunas do Excel (opcional)
    # Insira via: docker compose cp excel_columns_mapping.json app:/app/config/
