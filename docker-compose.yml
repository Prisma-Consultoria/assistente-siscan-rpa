name: siscan-rpa

services:
  siscan:
    container_name: extrator-siscan-rpa
    image: ghcr.io/prisma-consultoria/siscan-rpa-rpa:main
    restart: unless-stopped
    environment:
      - PRODUCTION=true
      - SECRET_KEY=${SECRET_KEY}

      - RPA_MAX_ATTEMPTS=${RPA_MAX_ATTEMPTS:-3}

      - CRON_ENABLED=true
      - CRON_INTERVAL_SECONDS=${CRON_INTERVAL_SECONDS:-1800}

      - PW_HEADLESS=true
      - PW_BROWSER=chromium
      - PW_CONTEXT_STORAGE_STATE=data/.artifacts/auth/storage_state.json

      # Diagnóstico desabilitado em produção (fixo — não sobrescrito por .env)
      - TAKE_SCREENSHOT=false
      - PW_RECORD_VIDEO=false
      - PW_TRACING=false
      - SAVE_PAGE_HTML=false
    ports:
      - "${HOST_APP_EXTERNAL_PORT:-5001}:${APP_INTERNAL_PORT:-5000}"
    volumes:
      - ${VOLUME_DATA:-siscan-data}:/app/data
      - ${VOLUME_MEDIA:-siscan-media}:/app/media
      - ${VOLUME_LOGS:-siscan-logs}:/app/logs
      - ${VOLUME_CONFIG:-siscan-config}:/app/config

    deploy:
      resources:
        limits:
          memory: 2G

    logging:
      driver: local

    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://127.0.0.1:${APP_INTERNAL_PORT:-5000}/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  ${VOLUME_DATA:-siscan-data}:
    # Banco SQLite e autenticação do Playwright
  ${VOLUME_MEDIA:-siscan-media}:
    # Downloads, relatórios de laudos e Excel consolidado
  ${VOLUME_LOGS:-siscan-logs}:
    # Logs operacionais
  ${VOLUME_CONFIG:-siscan-config}:
    # Arquivo JSON de mapeamento de colunas do Excel (opcional)
    # Insira via: docker compose cp excel_columns_mapping.json siscan:/app/config/
